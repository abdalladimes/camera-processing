    <style>
        html {
            border: 5px solid red;
        }

        html[titlebar-visible="true"] {
            background-color: aquamarine;
        }

        html[navbar-visible="true"] * {
            color: yellow !important;
        }

        body {
            background-color: #f0f0f0;
            border: 5px solid green;
            padding-top: var(--bf-safe-area-inset-top, 0);
            padding-bottom: var(--bf-safe-area-inset-bottom, 0);
        }

        .content {
            height: 100%;
            width: 100%;
            border: 5px solid blue;
        }

        .fab {
            position: fixed;
            background-color: #ff0000;
            color: #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            font-size: 24px;
            box-shadow: 0 2px 5px 0 rgba(0, 0, 0, 0.26);
            cursor: pointer;
        }

        .fab.top {
            top: var(--bf-safe-area-inset-top, 0);
        }

        .fab.bottom {
            bottom: var(--bf-safe-area-inset-bottom, 0);
        }

        .fab.left {
            left: 0px;
        }

        .fab.right {
            right: 0px;
        }

        button {
            height: 70px;
            width: 100%;
        }

        .danger-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
